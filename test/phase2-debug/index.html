<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 2 调试 - 街景采样点</title>
  
  <!-- 安全密钥 -->
  <script>
    window._AMapSecurityConfig = {
      securityJsCode: '3bbda8110ca478853e8500df55ee9a7d'
    };
  </script>
  
  <!-- 高德 Loader -->
  <script src="https://webapi.amap.com/loader.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    
    .header {
      background: #1890ff;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 { font-size: 18px; }
    
    .main {
      display: flex;
      height: calc(100vh - 60px);
    }
    
    .sidebar {
      width: 350px;
      background: #f5f5f5;
      padding: 15px;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }
    
    .map-container {
      flex: 1;
      position: relative;
    }
    
    #map { width: 100%; height: 100%; }
    
    .panel {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .panel h3 {
      font-size: 14px;
      color: #333;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1890ff;
    }
    
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 4px;
      background: #1890ff;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }
    
    button:hover { background: #40a9ff; }
    button.success { background: #52c41a; }
    button.warning { background: #faad14; }
    
    .log {
      background: #1a1a1a;
      color: #0f0;
      padding: 10px;
      border-radius: 4px;
      font-family: 'Consolas', monospace;
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 10px;
    }
    
    .log-entry { margin: 2px 0; }
    .log-error { color: #ff4d4f; }
    .log-success { color: #52c41a; }
    .log-info { color: #40a9ff; }
    
    /* 街景弹窗 */
    .street-view-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .street-view-modal.active { display: flex; }
    
    .modal-content {
      background: white;
      width: 90%;
      max-width: 900px;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .modal-header {
      background: #1890ff;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-body {
      padding: 20px;
    }
    
    .image-container {
      width: 100%;
      height: 400px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      border-radius: 4px;
    }
    
    .image-container img {
      max-width: 100%;
      max-height: 100%;
    }
    
    .direction-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .direction-btn {
      padding: 8px;
      background: #f5f5f5;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
    
    .direction-btn:hover { background: #e6f7ff; border-color: #1890ff; }
    .direction-btn.active { background: #1890ff; color: white; }
    
    .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      width: auto;
      padding: 0 5px;
    }
    
    .info-text {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
    
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-left: 5px;
    }
    
    .status-ok { background: #f6ffed; color: #52c41a; }
    .status-error { background: #fff1f0; color: #ff4d4f; }
    .status-loading { background: #e6f7ff; color: #1890ff; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧭 Phase 2 调试 - 街景采样点</h1>
    <span>自动导入并预览街景数据</span>
  </div>
  
  <div class="main">
    <div class="sidebar">
      <div class="panel">
        <h3>操作面板</h3>
        <button onclick="loadMap()">1. 加载地图</button>
        <button class="success" onclick="importAndShowPoints()">2. 导入并显示采样点</button>
        <button class="warning" onclick="centerToFirstPoint()">3. 定位到第一个采样点</button>
        <button onclick="clearAll()">清除所有</button>
      </div>
      
      <div class="panel">
        <h3>状态信息</h3>
        <div id="status-info">
          <div>地图状态: <span class="status-badge status-loading" id="map-status">等待加载</span></div>
          <div style="margin-top:8px">采样点数量: <span id="point-count">-</span></div>
          <div style="margin-top:8px">后端状态: <span id="backend-status" class="status-badge status-loading">检测中...</span></div>
        </div>
      </div>
      
      <div class="panel">
        <h3>日志</h3>
        <div class="log" id="log"></div>
      </div>
    </div>
    
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>
  
  <!-- 街景预览弹窗 -->
  <div class="street-view-modal" id="street-view-modal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modal-title">街景预览</span>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="image-container">
          <img id="street-view-img" src="" alt="街景图片">
        </div>
        <div class="direction-buttons">
          <button class="direction-btn" onclick="switchDirection('N')">北 (N)</button>
          <button class="direction-btn" onclick="switchDirection('NE')">东北 (NE)</button>
          <button class="direction-btn" onclick="switchDirection('E')">东 (E)</button>
          <button class="direction-btn" onclick="switchDirection('SE')">东南 (SE)</button>
          <button class="direction-btn" onclick="switchDirection('S')">南 (S)</button>
          <button class="direction-btn" onclick="switchDirection('SW')">西南 (SW)</button>
          <button class="direction-btn" onclick="switchDirection('W')">西 (W)</button>
          <button class="direction-btn" onclick="switchDirection('NW')">西北 (NW)</button>
        </div>
        <div>
          <strong>场景描述:</strong>
          <p id="scene-description" class="info-text">暂无描述</p>
        </div>
        <div style="margin-top:10px">
          <strong>点位信息:</strong>
          <p id="point-info" class="info-text">-</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 嵌入式采样点数据 (图片从 Blind_map 后端 3001 端口提供) -->
  <script src="./points-data.js"></script>
  
  <script>
    // 配置
    const BACKEND_URL = 'http://localhost:3002';
    
    // 全局状态
    let map = null;
    let AMap = null;
    let markers = [];
    let currentPoint = null;
    let currentDirection = 'N';
    let allPoints = [];

    // 日志
    function log(msg, type = 'info') {
      const div = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const colorClass = type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : 'log-info';
      div.innerHTML += `<div class="log-entry ${colorClass}">[${time}] ${msg}</div>`;
      div.scrollTop = div.scrollHeight;
      console.log(`[${type}] ${msg}`);
    }

    // 更新状态
    function updateStatus(id, text, type = 'loading') {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'status-badge status-' + type;
    }

    // 加载地图
    async function loadMap() {
      log('开始加载地图...');
      
      try {
        // 等待 AMapLoader
        while (typeof AMapLoader === 'undefined') {
          await new Promise(r => setTimeout(r, 100));
        }
        
        // 加载 AMap
        AMap = await AMapLoader.load({
          key: "6e760d76e5650f0f9004c5412dcfc58e",
          version: "2.0",
          plugins: ['AMap.Scale', 'AMap.ToolBar']
        });
        
        log('AMap 加载成功，版本: ' + AMap.version, 'success');
        
        // 创建地图
        map = new AMap.Map('map', {
          zoom: 18,
          center: [113.3225, 23.1364], // 广州采样点中心
          viewMode: '2D'
        });
        
        map.addControl(new AMap.Scale());
        map.addControl(new AMap.ToolBar({ position: 'RB' }));
        
        log('地图创建成功！', 'success');
        updateStatus('map-status', '已加载', 'ok');
        
      } catch (err) {
        log('地图加载失败: ' + err.message, 'error');
        updateStatus('map-status', '失败', 'error');
      }
    }

    // 导入并显示采样点
    async function importAndShowPoints() {
      if (!map) {
        log('请先加载地图！', 'error');
        return;
      }
      
      log('开始导入采样点数据...');
      
      try {
        // 使用嵌入式数据 (避免 CORS 问题)
        if (typeof STREET_VIEW_POINTS === 'undefined') {
          throw new Error('采样点数据未加载，请检查 points-data.js');
        }
        
        allPoints = STREET_VIEW_POINTS;
        log(`读取到 ${allPoints.length} 个采样点 (图片从 localhost:3001)`, 'success');
        
        // 清除旧标记
        markers.forEach(m => m.setMap(null));
        markers = [];
        
        // 添加标记
        allPoints.forEach(point => {
          const marker = new AMap.Marker({
            position: [point.coordinates.longitude, point.coordinates.latitude],
            content: `
              <div style="
                background: #1890ff;
                color: white;
                padding: 6px 10px;
                border-radius: 4px;
                font-size: 12px;
                font-weight: bold;
                box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                cursor: pointer;
              ">
                📍 ${point.point_id}
              </div>
            `,
            offset: new AMap.Pixel(-30, -20),
            extData: point
          });
          
          // 点击事件
          marker.on('click', () => {
            openStreetView(point);
          });
          
          marker.setMap(map);
          markers.push(marker);
        });
        
        log(`成功显示 ${markers.length} 个采样点`, 'success');
        document.getElementById('point-count').textContent = markers.length;
        
        // 自动定位到第一个点
        if (allPoints.length > 0) {
          const first = allPoints[0];
          map.setCenter([first.coordinates.longitude, first.coordinates.latitude]);
          log(`已定位到第一个采样点: ${first.point_id}`);
        }
        
      } catch (err) {
        log('导入失败: ' + err.message, 'error');
      }
    }

    // 定位到第一个采样点
    function centerToFirstPoint() {
      if (!map) {
        log('请先加载地图！', 'error');
        return;
      }
      
      if (allPoints.length === 0) {
        log('没有采样点数据，请先导入！', 'error');
        return;
      }
      
      const first = allPoints[0];
      map.setCenter([first.coordinates.longitude, first.coordinates.latitude]);
      map.setZoom(19);
      log(`已定位到: ${first.point_id}`);
    }

    // 打开街景预览
    function openStreetView(point) {
      currentPoint = point;
      currentDirection = 'N';
      
      document.getElementById('modal-title').textContent = `街景预览 - ${point.point_id}`;
      document.getElementById('scene-description').textContent = point.scene_description || '暂无描述';
      document.getElementById('point-info').textContent = 
        `坐标: ${point.coordinates.longitude.toFixed(6)}, ${point.coordinates.latitude.toFixed(6)}`;
      
      // 显示默认方向图片
      updateStreetViewImage();
      
      // 更新按钮状态
      document.querySelectorAll('.direction-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector('.direction-btn:nth-child(1)').classList.add('active');
      
      // 显示弹窗
      document.getElementById('street-view-modal').classList.add('active');
      
      log(`打开街景预览: ${point.point_id}`);
    }

    // 切换方向
    function switchDirection(dir) {
      currentDirection = dir;
      updateStreetViewImage();
      
      // 更新按钮状态
      document.querySelectorAll('.direction-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      log(`切换方向: ${dir}`);
    }

    // 更新街景图片
    function updateStreetViewImage() {
      if (!currentPoint) return;
      
      const imgUrl = currentPoint.images?.[currentDirection];
      const container = document.querySelector('.image-container');
      
      // 重置容器
      container.innerHTML = '<img id="street-view-img" alt="街景图片">';
      const imgEl = document.getElementById('street-view-img');
      imgEl.style.maxWidth = '100%';
      imgEl.style.maxHeight = '100%';
      imgEl.style.objectFit = 'contain';
      
      if (imgUrl) {
        log(`加载图片: ${imgUrl.split('/').pop()}`);
        
        // 直接加载，不使用 crossOrigin (避免CORS)
        imgEl.src = imgUrl;
        
        imgEl.onload = () => {
          log(`✅ 图片加载成功`, 'success');
        };
        
        imgEl.onerror = (e) => {
          console.error('图片加载错误:', e);
          log(`❌ 图片加载失败: ${imgUrl}`, 'error');
          container.innerHTML = `
            <div style="color:#f44336; padding: 20px;">
              <strong>图片加载失败</strong><br><br>
              URL: ${imgUrl}<br>
              请检查:<br>
              1. Blind_map 后端是否在 3000 端口运行<br>
              2. 是否已重启后端应用 CORS 配置<br>
              3. 在浏览器地址栏直接访问: <a href="${imgUrl}" target="_blank">${imgUrl}</a>
            </div>
          `;
        };
      } else {
        container.innerHTML = '<div style="color:#999; padding: 40px;">该方向无图片</div>';
      }
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('street-view-modal').classList.remove('active');
    }

    // 清除所有
    function clearAll() {
      markers.forEach(m => m.setMap(null));
      markers = [];
      allPoints = [];
      document.getElementById('point-count').textContent = '0';
      log('已清除所有标记');
    }

    // 检测后端
    async function checkBackend() {
      try {
        const res = await fetch(`${BACKEND_URL}/health`, { method: 'GET' });
        if (res.ok) {
          updateStatus('backend-status', '已连接', 'ok');
          log('后端服务已连接');
        } else {
          updateStatus('backend-status', '异常', 'error');
        }
      } catch (e) {
        updateStatus('backend-status', '未启动', 'error');
        log('后端未启动，使用本地数据模式', 'error');
      }
    }

    // 页面加载
    window.onload = () => {
      log('页面加载完成');
      log('✅ 已导入 Blind_map 的 33 个采样点');
      log('请按顺序点击按钮进行测试:');
      log('1. 加载地图');
      log('2. 导入并显示采样点');
      checkBackend();
    };
  </script>
</body>
</html>
