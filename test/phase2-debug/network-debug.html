<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网络连接深度诊断</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { color: #333; border-bottom: 3px solid #1890ff; padding-bottom: 10px; }
    .section {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .btn {
      background: #1890ff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    .btn:hover { background: #40a9ff; }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 13px;
    }
    .success { color: #52c41a; }
    .error { color: #f5222d; }
    .warning { color: #faad14; }
    .info-box {
      background: #e6f7ff;
      border-left: 4px solid #1890ff;
      padding: 15px;
      margin: 10px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #d9d9d9;
      padding: 10px;
      text-align: left;
    }
    th { background: #fafafa; }
  </style>
</head>
<body>
  <h1>🔍 网络连接深度诊断</h1>
  
  <div class="section">
    <h2>1. 页面环境信息</h2>
    <div id="page-info"></div>
  </div>

  <div class="section">
    <h2>2. 后端连接测试（多种模式）</h2>
    <button class="btn" onclick="testNoCORS()">测试1: no-cors 模式</button>
    <button class="btn" onclick="testCORS()">测试2: cors 模式</button>
    <button class="btn" onclick="testSameOrigin()">测试3: same-origin 模式</button>
    <button class="btn" onclick="testImageTag()">测试4: 图片标签加载</button>
    <button class="btn" onclick="testScriptTag()">测试5: 脚本标签测试</button>
    <div id="connection-results"></div>
  </div>

  <div class="section">
    <h2>3. 端口扫描测试</h2>
    <button class="btn" onclick="scanPorts()">扫描常见端口</button>
    <div id="port-scan-results"></div>
  </div>

  <div class="section">
    <h2>4. 手动测试链接</h2>
    <p>请在浏览器新标签页打开以下链接，看能否访问：</p>
    <ul>
      <li><a href="http://localhost:3000/" target="_blank">http://localhost:3000/</a></li>
      <li><a href="http://localhost:3000/health" target="_blank">http://localhost:3000/health</a></li>
      <li><a href="http://127.0.0.1:3000/health" target="_blank">http://127.0.0.1:3000/health</a></li>
      <li><a href="http://[::1]:3000/health" target="_blank">http://[::1]:3000/health</a> (IPv6)</li>
    </ul>
  </div>

  <div class="section">
    <h2>5. 诊断总结</h2>
    <div id="diagnosis-summary">
      请运行上述测试后查看诊断结果...
    </div>
  </div>

  <script>
    // 1. 显示页面环境信息
    function showPageInfo() {
      const info = document.getElementById('page-info');
      const protocol = window.location.protocol;
      const hostname = window.location.hostname;
      const port = window.location.port;
      
      let warning = '';
      if (protocol === 'file:') {
        warning = '<p class="warning">⚠️ 警告：页面通过 file:// 协议打开，这可能导致跨域问题！<br>建议通过 http://localhost 访问此页面。</p>';
      }
      
      info.innerHTML = `
        <table>
          <tr><th>属性</th><th>值</th></tr>
          <tr><td>协议 (Protocol)</td><td>${protocol}</td></tr>
          <tr><td>主机 (Hostname)</td><td>${hostname}</td></tr>
          <tr><td>端口 (Port)</td><td>${port || '默认'}</td></tr>
          <tr><td>完整 URL</td><td>${window.location.href}</td></tr>
          <tr><td>用户代理</td><td>${navigator.userAgent.substring(0, 80)}...</td></tr>
        </table>
        ${warning}
      `;
    }

    // 测试1: no-cors 模式
    async function testNoCORS() {
      const resultDiv = document.getElementById('connection-results');
      resultDiv.innerHTML += '<h3>测试1: no-cors 模式</h3><pre>测试中...</pre>';
      
      try {
        const response = await fetch('http://localhost:3000/health', {
          method: 'GET',
          mode: 'no-cors'
        });
        resultDiv.innerHTML = resultDiv.innerHTML.replace('<pre>测试中...</pre>', 
          `<pre class="success">✅ no-cors 请求发送成功
注意: no-cors 模式下无法读取响应内容，只能确认请求是否发送</pre>`
        );
      } catch (err) {
        resultDiv.innerHTML = resultDiv.innerHTML.replace('<pre>测试中...</pre>', 
          `<pre class="error">❌ no-cors 也失败了
错误: ${err.name}: ${err.message}
说明: 后端确实无法访问，不是CORS问题</pre>`
        );
      }
    }

    // 测试2: cors 模式
    async function testCORS() {
      const resultDiv = document.getElementById('connection-results');
      resultDiv.innerHTML += '<h3>测试2: cors 模式</h3><pre>测试中...</pre>';
      
      try {
        const response = await fetch('http://localhost:3000/health', {
          method: 'GET',
          mode: 'cors'
        });
        const text = await response.text();
        resultDiv.innerHTML = resultDiv.innerHTML.replace('<pre>测试中...</pre>', 
          `<pre class="success">✅ CORS 请求成功!
状态码: ${response.status}
响应头 Access-Control-Allow-Origin: ${response.headers.get('Access-Control-Allow-Origin') || '未设置'}
响应内容: ${text.substring(0, 200)}</pre>`
        );
      } catch (err) {
        resultDiv.innerHTML = resultDiv.innerHTML.replace('<pre>测试中...</pre>', 
          `<pre class="error">❌ CORS 请求失败
错误: ${err.name}: ${err.message}
可能原因:
1. 后端未运行
2. CORS未配置
3. 通过file://打开页面导致的问题</pre>`
        );
      }
    }

    // 测试3: same-origin 模式
    async function testSameOrigin() {
      const resultDiv = document.getElementById('connection-results');
      resultDiv.innerHTML += '<h3>测试3: same-origin 模式</h3><pre>测试中...</pre>';
      
      try {
        const response = await fetch('http://localhost:3000/health', {
          method: 'GET',
          mode: 'same-origin'
        });
        resultDiv.innerHTML = resultDiv.innerHTML.replace('<pre>测试中...</pre>', 
          `<pre class="success">✅ same-origin 请求成功!</pre>`
        );
      } catch (err) {
        resultDiv.innerHTML = resultDiv.innerHTML.replace('<pre>测试中...</pre>', 
          `<pre class="error">❌ same-origin 请求失败
错误: ${err.name}: ${err.message}</pre>`
        );
      }
    }

    // 测试4: 图片标签
    function testImageTag() {
      const resultDiv = document.getElementById('connection-results');
      resultDiv.innerHTML += '<h3>测试4: 图片标签加载</h3><div id="img-test">测试中...</div>';
      
      const img = new Image();
      img.onload = () => {
        document.getElementById('img-test').innerHTML = 
          `<pre class="success">✅ 图片加载成功! 尺寸: ${img.width}x${img.height}</pre>`;
      };
      img.onerror = () => {
        document.getElementById('img-test').innerHTML = 
          `<pre class="error">❌ 图片加载失败</pre>`;
      };
      img.src = 'http://localhost:3000/images/P001_N.jpg?' + Date.now();
    }

    // 测试5: 脚本标签
    function testScriptTag() {
      const resultDiv = document.getElementById('connection-results');
      resultDiv.innerHTML += '<h3>测试5: 脚本标签测试</h3><div id="script-test">测试中...</div>';
      
      const script = document.createElement('script');
      script.onload = () => {
        document.getElementById('script-test').innerHTML = 
          `<pre class="success">✅ 脚本加载成功 (说明服务器响应了)</pre>`;
      };
      script.onerror = () => {
        document.getElementById('script-test').innerHTML = 
          `<pre class="error">❌ 脚本加载失败</pre>`;
      };
      script.src = 'http://localhost:3000/health?' + Date.now();
      document.head.appendChild(script);
    }

    // 端口扫描
    async function scanPorts() {
      const resultDiv = document.getElementById('port-scan-results');
      resultDiv.innerHTML = '<pre>正在扫描端口...</pre>';
      
      const ports = [3000, 3001, 3002, 8080, 5000, 8000];
      const results = [];
      
      for (const port of ports) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 1000);
          
          await fetch(`http://localhost:${port}/health`, {
            method: 'HEAD',
            mode: 'no-cors',
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);
          results.push(`端口 ${port}: 可能有服务`);
        } catch (err) {
          if (err.name === 'AbortError') {
            results.push(`端口 ${port}: 超时/无响应`);
          } else {
            results.push(`端口 ${port}: ${err.message.substring(0, 30)}`);
          }
        }
      }
      
      resultDiv.innerHTML = `<pre>${results.join('\n')}</pre>`;
    }

    // 页面加载时显示信息
    showPageInfo();
  </script>
</body>
</html>
