<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片加载诊断 - Blind_map 后端</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
      border-bottom: 2px solid #1890ff;
      padding-bottom: 10px;
    }
    #console {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      min-height: 300px;
    }
    .success { color: #4caf50; }
    .error { color: #f44336; }
    .info { color: #2196f3; }
  </style>
</head>
<body>
  <h1>🩺 Blind_map 图片加载诊断工具</h1>
  <div id="console">正在运行诊断...</div>
  
  <script>
    // 重定向 console 到页面
    const consoleDiv = document.getElementById('console');
    const originalLog = console.log;
    
    console.log = (...args) => {
      originalLog.apply(console, args);
      const text = args.map(a => 
        typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)
      ).join(' ');
      consoleDiv.textContent += text + '\n';
    };
    
    const BLINDMAP_IMAGE_URL = 'http://localhost:3000/public/images/P001_N.jpg';

    // 测试 1: 直接通过 fetch HEAD 请求测试 CORS
    async function testCORS() {
      console.log('[测试 1] 测试 CORS 配置...');
      try {
        const response = await fetch(BLINDMAP_IMAGE_URL, {
          method: 'HEAD',
          mode: 'cors'
        });
        
        console.log('✅ CORS 测试通过');
        console.log('   状态码:', response.status);
        console.log('   Access-Control-Allow-Origin:', response.headers.get('Access-Control-Allow-Origin'));
        return true;
      } catch (err) {
        console.log('❌ CORS 测试失败');
        console.log('   错误:', err.message);
        return false;
      }
    }

    // 测试 2: 检查后端健康
    async function testBackend() {
      console.log('\n[测试 2] 测试后端服务...');
      try {
        const response = await fetch('http://localhost:3000/health');
        const data = await response.json();
        console.log('✅ 后端服务正常');
        console.log('   状态:', data.status);
        console.log('   服务:', data.service);
        return true;
      } catch (err) {
        console.log('❌ 后端服务异常');
        console.log('   错误:', err.message);
        return false;
      }
    }

    // 测试 3: 通过 Image 对象加载
    function testImageLoad() {
      return new Promise((resolve) => {
        console.log('\n[测试 3] 通过 Image 对象加载...');
        const img = new Image();
        img.crossOrigin = 'anonymous';
        
        img.onload = () => {
          console.log('✅ 图片加载成功');
          console.log('   尺寸:', img.width, 'x', img.height);
          resolve(true);
        };
        
        img.onerror = () => {
          console.log('❌ 图片加载失败');
          console.log('   URL:', BLINDMAP_IMAGE_URL);
          resolve(false);
        };
        
        img.src = BLINDMAP_IMAGE_URL;
      });
    }

    // 运行所有测试
    async function runDiagnostics() {
      console.log('========================================');
      console.log('Blind_map 图片加载诊断');
      console.log('图片URL:', BLINDMAP_IMAGE_URL);
      console.log('========================================\n');
      
      const backendOk = await testBackend();
      const corsOk = await testCORS();
      const imageOk = await testImageLoad();
      
      console.log('\n========================================');
      console.log('诊断结果:');
      console.log('========================================');
      
      if (!backendOk) {
        console.log('❌ Blind_map 后端未启动或无法访问');
        console.log('   请执行: cd Blind_map/backend && npm start');
      } else if (!corsOk) {
        console.log('❌ CORS 配置未生效');
        console.log('   请确认已修改 app.js 并重启后端');
        console.log('   关键代码:');
        console.log('   app.use(\'/public\', express.static(..., {');
        console.log('     setHeaders: (res) => res.set(\'Access-Control-Allow-Origin\', \'*\')');
        console.log('   }));');
      } else if (!imageOk) {
        console.log('❌ 图片存在但无法显示（可能是格式问题）');
      } else {
        console.log('✅ 所有测试通过！图片应该能正常显示。');
      }
      
      console.log('\n如果问题仍然存在，请检查:');
      console.log('1. Blind_map 后端是否真的在端口 3000 运行');
      console.log('2. app.js 的 CORS 修改已保存并重启');
      console.log('3. 浏览器控制台是否有更详细的错误信息');
    }

    // 页面加载后自动运行
    window.addEventListener('load', runDiagnostics);
  </script>
</body>
</html>
