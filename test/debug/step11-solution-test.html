<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step 11: 解决方案测试 - JSAPI Loader + 安全密钥</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;

    .header {

    .header h1 {
      font-size: 20px;

    }
    
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .config-info {
      background: #fff;
      padding: 15px 20px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 13px;
      color: #666;
    }
    
    .config-info code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Consolas', monospace;
      color: #333;
    }
    
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .sidebar {
      width: 350px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      padding: 20px;
      overflow-y: auto;
    }
    
    .map-container {
      flex: 1;
      position: relative;
      background: #e0e0e0;
    }
    
    #container {
      width: 100%;
      height: 100%;
    }
    
    .btn {
      width: 100%;
      padding: 12px 20px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover {
      background: #5a67d8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #48bb78;
      color: white;
    }
    
    .btn-secondary:hover {
      background: #38a169;
    }
    
    .status-panel {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .status-item:last-child {
      border-bottom: none;
    }
    
    .status-label {
      flex: 1;
      font-size: 13px;
      color: #4a5568;
    }
    
    .status-value {
      font-size: 13px;
      font-weight: 500;
    }
    
    .status-pending {
      color: #a0aec0;
    }
    
    .status-success {
      color: #48bb78;
    }
    
    .status-error {
      color: #f56565;
    }
    
    .log-panel {
      background: #1a202c;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #2d3748;
    }
    
    .log-entry:last-child {
      border-bottom: none;
    }
    
    .log-time {
      color: #718096;
      margin-right: 8px;
    }
    
    .log-success {
      color: #68d391;
    }
    
    .log-error {
      color: #fc8181;
    }
    
    .log-info {
      color: #63b3ed;
    }
    
    .log-warning {
      color: #f6ad55;
    }
    
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .badge-success {
      background: #c6f6d5;
      color: #22543d;
    }
    
    .badge-error {
      background: #fed7d7;
      color: #742a2a;
    }
    
    .badge-pending {
      background: #e2e8f0;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🗺️ Step 11: 解决方案测试</h1>
    <p>使用 JSAPI Loader + 安全密钥配置测试高德地图加载</p>
  </div>
  
  <div class="config-info">
    <strong>配置信息:</strong> 
    Key: <code>6e760d76e5650f0f9004c5412dcfc58e</code> | 
    安全密钥: <code>3bbda8110ca478853e8500df55ee9a7d</code>
  </div>
  
  <div class="main">
    <div class="sidebar">
      <button class="btn btn-primary" onclick="loadMapWithSolution()">
        🚀 加载地图（完整方案）
      </button>
      <button class="btn btn-secondary" onclick="checkCanvasStatus()">
        🔍 检查 Canvas 状态
      </button>
      
      <div class="status-panel">
        <h3 style="font-size: 14px; margin-bottom: 15px; color: #2d3748;">加载状态</h3>
        <div class="status-item">
          <span class="status-label">安全密钥配置</span>
          <span class="status-value status-pending" id="status-security">⏳ 待检测</span>
        </div>
        <div class="status-item">
          <span class="status-label">Loader 加载</span>
          <span class="status-value status-pending" id="status-loader">⏳ 待检测</span>
        </div>
        <div class="status-item">
          <span class="status-label">地图实例创建</span>
          <span class="status-value status-pending" id="status-map">⏳ 待检测</span>
        </div>
        <div class="status-item">
          <span class="status-label">Complete 事件</span>
          <span class="status-value status-pending" id="status-complete">⏳ 待检测</span>
        </div>
        <div class="status-item">
          <span class="status-label">Canvas 数量</span>
          <span class="status-value status-pending" id="status-canvas">⏳ 待检测</span>
        </div>
        <div class="status-item">
          <span class="status-label">瓦片显示</span>
          <span class="status-value status-pending" id="status-tiles">⏳ 待检测</span>
        </div>
      </div>
      
      <div class="log-panel" id="log-panel">
        <div class="log-entry">
          <span class="log-time">[系统]</span>
          <span class="log-info">等待加载地图...</span>
        </div>
      </div>
    </div>
    
    <div class="map-container">
      <div id="container"></div>
    </div>
  </div>

  <!-- 步骤 1: 配置安全密钥 -->
  <script type="text/javascript">
    // ============================================
    // 安全优先配置：必须在加载 SDK 之前配置
    // ============================================
    console.log('[Step 1] 配置安全密钥...');
    
    window._AMapSecurityConfig = {
      securityJsCode: '3bbda8110ca478853e8500df55ee9a7d'
    };
    
    console.log('[Step 1] ✅ 安全密钥配置完成');
    
    // 更新状态显示
    document.addEventListener('DOMContentLoaded', function() {
      updateStatus('status-security', 'success', '✅ 已配置');
      log('安全密钥配置完成', 'success');
    });
    
    // 日志函数
    function log(message, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const panel = document.getElementById('log-panel');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${type}">${message}</span>`;
      panel.appendChild(entry);
      panel.scrollTop = panel.scrollHeight;
      console.log(`[${type.toUpperCase()}] ${message}`);
    }
    
    // 更新状态
    function updateStatus(id, status, text) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'status-value status-' + status;
    }
  </script>
  
  <!-- 步骤 2: 加载 JSAPI Loader -->
  <script src="https://webapi.amap.com/loader.js"></script>
  
  <!-- 步骤 3: 使用 Loader 加载地图 -->
  <script type="text/javascript">
    let map = null;
    let AMap = null;
    
    async function loadMapWithSolution() {
      log('========================================', 'info');
      log('开始加载地图（完整解决方案）', 'info');
      log('========================================', 'info');
      
      // 清理旧地图
      if (map) {
        log('清理旧地图实例...', 'info');
        map.destroy();
        map = null;
        document.getElementById('container').innerHTML = '';
      }
      
      // 重置状态
      ['status-loader', 'status-map', 'status-complete', 'status-canvas', 'status-tiles'].forEach(id => {
        updateStatus(id, 'pending', '⏳ 加载中...');
      });
      
      try {
        // ============================================
        // 步骤 3.1: 使用 Loader 加载高德 API
        // ============================================
        log('[Step 2] 调用 AMapLoader.load()...', 'info');
        
        AMap = await AMapLoader.load({
          key: "6e760d76e5650f0f9004c5412dcfc58e",
          version: "2.0",
          plugins: ['AMap.Scale', 'AMap.ToolBar']
        });
        
        log('[Step 2] ✅ Loader 加载成功', 'success');
        log(`[Step 2] AMap 版本: ${AMap.version}`, 'info');
        updateStatus('status-loader', 'success', '✅ 成功');
        
        // ============================================
        // 步骤 3.2: 创建地图实例
        // ============================================
        log('[Step 3] 创建地图实例...', 'info');
        
        map = new AMap.Map('container', {
          zoom: 11,
          center: [116.397428, 39.90923], // 北京中心
          viewMode: '2D',
          resizeEnable: true
        });
        
        log('[Step 3] ✅ 地图实例创建成功', 'success');
        updateStatus('status-map', 'success', '✅ 成功');
        
        // ============================================
        // 步骤 3.3: 添加控件
        // ============================================
        log('[Step 4] 添加控件...', 'info');
        
        map.addControl(new AMap.Scale());
        log('[Step 4] ✅ Scale 控件添加成功', 'success');
        
        map.addControl(new AMap.ToolBar({
          position: 'RB'
        }));
        log('[Step 4] ✅ ToolBar 控件添加成功', 'success');
        
        // ============================================
        // 步骤 3.4: 监听 complete 事件
        // ============================================
        log('[Step 5] 监听地图 complete 事件...', 'info');
        
        map.on('complete', function() {
          log('[Step 5] ✅ 地图 complete 事件触发！', 'success');
          updateStatus('status-complete', 'success', '✅ 已触发');
          
          // 延迟检查 Canvas
          setTimeout(checkCanvasStatus, 1000);
        });
        
        // ============================================
        // 步骤 3.5: 监听错误事件
        // ============================================
        map.on('error', function(e) {
          log(`[错误] 地图错误: ${JSON.stringify(e)}`, 'error');
        });
        
        log('========================================', 'success');
        log('地图初始化完成，等待 complete 事件...', 'success');
        log('========================================', 'success');
        
      } catch (error) {
        log('========================================', 'error');
        log('❌ 地图加载失败！', 'error');
        log(`错误信息: ${error.message}`, 'error');
        log('========================================', 'error');
        
        updateStatus('status-loader', 'error', '❌ 失败');
        updateStatus('status-map', 'error', '❌ 失败');
        
        console.error('完整错误:', error);
      }
    }
    
    // 检查 Canvas 状态
    function checkCanvasStatus() {
      log('[检查] 检查 Canvas 状态...', 'info');
      
      const container = document.getElementById('container');
      const canvases = container.querySelectorAll('canvas');
      const images = container.querySelectorAll('img[src*="amap"]');
      
      log(`[检查] Canvas 数量: ${canvases.length}`, canvases.length > 0 ? 'success' : 'warning');
      log(`[检查] 瓦片图片数量: ${images.length}`, images.length > 0 ? 'success' : 'warning');
      
      updateStatus('status-canvas', canvases.length > 0 ? 'success' : 'error', 
        canvases.length > 0 ? `✅ ${canvases.length}个` : '❌ 0个');
      
      // 检查 Canvas 内容
      if (canvases.length > 0) {
        canvases.forEach((canvas, index) => {
          log(`[检查] Canvas ${index + 1}: ${canvas.width}x${canvas.height}`, 'info');
          
          try {
            const ctx = canvas.getContext('2d');
            if (ctx) {
              // 读取部分像素检查是否有内容
              const imageData = ctx.getImageData(0, 0, Math.min(100, canvas.width), Math.min(100, canvas.height));
              const data = imageData.data;
              let hasContent = false;
              
              for (let i = 0; i < data.length; i += 4) {
                if (data[i] > 0 || data[i+1] > 0 || data[i+2] > 0) {
                  hasContent = true;
                  break;
                }
              }
              
              if (hasContent) {
                log(`[检查] Canvas ${index + 1} 包含像素内容 ✅`, 'success');
                updateStatus('status-tiles', 'success', '✅ 有内容');
              } else {
                log(`[检查] Canvas ${index + 1} 可能是空的/黑色 ⚠️`, 'warning');
                updateStatus('status-tiles', 'warning', '⚠️ 可能空白');
              }
            }
          } catch (e) {
            log(`[检查] 无法读取 Canvas ${index + 1}: ${e.message}`, 'warning');
          }
        });
      } else {
        updateStatus('status-tiles', 'error', '❌ 无法检测');
      }
      
      // 最终结论
      if (canvases.length > 0) {
        log('========================================', 'success');
        log('✅ Canvas 检查完成！', 'success');
        log('如果右侧地图显示正常，说明方案成功！', 'success');
        log('========================================', 'success');
      } else {
        log('========================================', 'error');
        log('❌ 未找到 Canvas 元素', 'error');
        log('========================================', 'error');
      }
    }
    
    // 页面加载完成提示
    window.addEventListener('load', function() {
      log('页面加载完成', 'info');
      log('安全密钥已配置', 'success');
      log('JSAPI Loader 已加载', 'success');
      log('点击"加载地图"按钮开始测试', 'info');
    });
  </script>
</body>
</html>
