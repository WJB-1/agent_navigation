<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Step 2: 带插件的高德地图</title>
  <style>
    body { margin: 0; padding: 20px; font-family: Arial; }
    #map { width: 100%; height: 400px; border: 2px solid green; }
    #log { background: #f5f5f5; padding: 10px; margin-top: 10px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Step 2: 带插件的高德地图测试</h2>
  <button onclick="loadMapWithPlugins()">加载地图（含插件）</button>
  <button onclick="checkPlugins()">检查插件</button>
  <div id="map"></div>
  <div id="log"></div>

  <script src="https://webapi.amap.com/maps?v=2.0&key=0beb99f14b04f13a734c81c032b9a8f1"></script>
  
  <script>
    function log(msg, type = 'info') {
      const div = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      div.innerHTML += `<div class="${className}">[${time}] ${msg}</div>`;
      div.scrollTop = div.scrollHeight;
    }

    function checkPlugins() {
      log('=== 检查插件类 ===', 'info');
      const plugins = ['Scale', 'ToolBar', 'Geolocation'];
      plugins.forEach(name => {
        if (AMap[name]) {
          log(`✅ AMap.${name} 存在`);
        } else {
          log(`❌ AMap.${name} 不存在（需要加载）`);
        }
      });
    }

    function loadMapWithPlugins() {
      log('=== 开始加载（含插件）===', 'info');
      
      if (typeof AMap === 'undefined') {
        log('❌ AMap 未加载', 'error');
        return;
      }

      // 先加载插件
      const plugins = ['AMap.Scale', 'AMap.ToolBar'];
      log(`⏳ 加载插件: ${plugins.join(', ')}`);
      
      AMap.plugin(plugins, function() {
        log('✅ 插件加载完成', 'success');
        
        // 创建地图
        const map = new AMap.Map('map', {
          zoom: 15,
          center: [116.397428, 39.90923]
        });
        log('✅ 地图创建成功');

        // 添加控件
        try {
          map.addControl(new AMap.Scale());
          log('✅ Scale 控件添加成功');
        } catch (e) {
          log(`❌ Scale 失败: ${e.message}`, 'error');
        }

        try {
          map.addControl(new AMap.ToolBar({ position: 'RB' }));
          log('✅ ToolBar 控件添加成功');
        } catch (e) {
          log(`❌ ToolBar 失败: ${e.message}`, 'error');
        }

        // 添加标记
        const marker = new AMap.Marker({
          position: [116.397428, 39.90923],
          title: '测试点'
        });
        marker.setMap(map);
        log('✅ 标记添加完成', 'success');
      });
    }

    window.onload = () => {
      log('页面加载完成', 'info');
    };
  </script>
</body>
</html>
