<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Step 6: 瓦片深度检查</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial; background: #1a1a1a; color: #fff; }
    
    .container {
      display: flex;
      height: 100vh;
    }
    
    .sidebar {
      width: 450px;
      background: #2d2d2d;
      padding: 15px;
      overflow-y: auto;
      border-right: 1px solid #444;
    }
    
    .map-wrapper {
      flex: 1;
      position: relative;
      background: #000;
    }
    
    #map {
      width: 100%;
      height: 100%;
    }
    
    h3 { margin: 0 0 15px 0; color: #4fc3f7; border-bottom: 2px solid #4fc3f7; padding-bottom: 10px; }
    h4 { margin: 15px 0 10px 0; color: #81c784; }
    
    button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      background: #4fc3f7;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    
    button:hover { background: #29b6f6; }
    
    .log-panel {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 10px;
      margin-top: 10px;
      font-family: 'Consolas', monospace;
      font-size: 11px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .log-line { margin: 2px 0; }
    .error { color: #ef5350; }
    .success { color: #66bb6a; }
    .warning { color: #ffa726; }
    .info { color: #42a5f5; }
    
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 5px;
      margin-top: 10px;
    }
