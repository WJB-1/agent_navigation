<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Step 1: 基础高德地图测试</title>
  <style>
    body { margin: 0; padding: 20px; font-family: Arial; }
    #map { width: 100%; height: 400px; border: 2px solid blue; }
    #log { background: #f5f5f5; padding: 10px; margin-top: 10px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Step 1: 基础高德地图加载测试</h2>
  <button onclick="loadMap()">1. 加载地图</button>
  <button onclick="checkAMap()">2. 检查 AMap</button>
  <div id="map"></div>
  <div id="log"></div>

  <!-- 方式1: 传统同步加载 -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=0beb99f14b04f13a734c81c032b9a8f1"></script>
  
  <script>
    function log(msg, type = 'info') {
      const div = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      div.innerHTML += `<div class="${className}">[${time}] ${msg}</div>`;
      div.scrollTop = div.scrollHeight;
      console.log(`[${type}] ${msg}`);
    }

    function checkAMap() {
      log('=== 检查 AMap 对象 ===', 'info');
      if (typeof AMap === 'undefined') {
        log('❌ AMap 未定义!', 'error');
        return;
      }
      log('✅ AMap 已定义', 'success');
      log(`AMap.version: ${AMap.version || 'unknown'}`);
      
      const checks = ['Map', 'Marker', 'Pixel', 'Size', 'plugin'];
      checks.forEach(name => {
        if (AMap[name]) {
          log(`✅ AMap.${name} 存在`);
        } else {
          log(`❌ AMap.${name} 不存在`, 'error');
        }
      });
    }

    function loadMap() {
      log('=== 开始加载地图 ===', 'info');
      
      if (typeof AMap === 'undefined') {
        log('❌ AMap 未加载，无法创建地图', 'error');
        return;
      }

      try {
        const map = new AMap.Map('map', {
          zoom: 15,
          center: [116.397428, 39.90923],
          viewMode: '2D'
        });
        log('✅ 地图创建成功!', 'success');
        
        // 添加一个简单标记
        const marker = new AMap.Marker({
          position: [116.397428, 39.90923],
          title: '测试标记'
        });
        marker.setMap(map);
        log('✅ 标记添加成功', 'success');
        
      } catch (e) {
        log(`❌ 错误: ${e.message}`, 'error');
        console.error(e);
      }
    }

    // 页面加载自动检查
    window.onload = () => {
      log('页面加载完成', 'info');
      setTimeout(checkAMap, 500);
    };
  </script>
</body>
</html>
