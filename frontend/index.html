<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视障语义地图导航预览</title>

  <!-- 高德地图安全密钥配置 -->
  <script type="text/javascript">
    window._AMapSecurityConfig = {
      securityJsCode: '3bbda8110ca478853e8500df55ee9a7d'
    }
  </script>

  <!-- 高德地图 JSAPI Loader -->
  <script src="https://webapi.amap.com/loader.js"></script>

  <link rel="stylesheet" href="./src/style.css">
</head>

<body>
  <div id="app">
    <header class="app-header">
      <h1>🧭 视障语义地图导航预览</h1>
      <span class="phase-tag">Phase 3 - 空间导航</span>
    </header>

    <main class="app-main">
      <aside class="sidebar">
        <div id="config-panel-container"></div>

        <div class="route-info" id="route-info">
          <h4>📍 导航选点</h4>
          <div class="route-point">
            <span class="point-label origin">起点</span>
            <span class="point-value" id="origin-value">未设置</span>
          </div>
          <div class="route-point">
            <span class="point-label destination">终点</span>
            <span class="point-value" id="destination-value">未设置</span>
          </div>
          <button id="generate-preview-btn" class="btn btn-primary btn-generate" disabled>
            🎬 生成推演播报
          </button>
        </div>

        <!-- Phase 3 导航测试面板 -->
        <div class="nav-preview-panel" id="nav-preview-panel">
          <h4>🧭 导航预览测试 (Phase 3)</h4>
          <div class="preview-buttons">
            <button id="test-nav-btn" class="btn btn-secondary btn-sm">
              🧪 测试预设路线
            </button>
            <button id="health-check-btn" class="btn btn-secondary btn-sm">
              💓 服务检查
            </button>
          </div>
          <div id="preview-loading" class="preview-loading hidden">
            <span class="loading-spinner"></span>
            <span>正在规划路径...</span>
          </div>
          <div id="preview-result" class="preview-result hidden">
            <div class="preview-summary"></div>
            <div class="preview-nodes"></div>
          </div>
          <div id="preview-error" class="preview-error hidden"></div>
        </div>
      </aside>

      <section class="map-container">
        <div id="map-viewer"></div>
      </section>
    </main>

    <div id="street-view-modal" class="modal"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
